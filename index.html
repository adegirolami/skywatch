<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKYWATCH</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #08080d;
      color: #ddd0b0;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      padding: 28px 32px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 20px;
      border-bottom: 1px solid #1c1c18;
      margin-bottom: 28px;
    }

    .brand { line-height: 1; }

    .title {
      font-size: 2.2rem;
      letter-spacing: 0.4em;
      color: #f5c842;
    }

    .location {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.2em;
      margin-top: 6px;
    }

    .meta {
      text-align: right;
      font-size: 0.72rem;
      color: #444;
      letter-spacing: 0.12em;
      line-height: 1.9;
    }

    .live {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: #4ade80;
      letter-spacing: 0.2em;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: blink 1.6s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    .bar-wrap {
      height: 2px;
      background: #161612;
      border-radius: 1px;
      overflow: hidden;
      margin-top: 8px;
    }
    .bar {
      height: 100%;
      background: #f5c842;
      width: 100%;
      transition: width 1s linear;
    }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; }

    thead th {
      padding: 6px 14px;
      font-size: 0.62rem;
      letter-spacing: 0.24em;
      color: #3a3a30;
      border-bottom: 1px solid #161612;
      text-align: left;
      text-transform: uppercase;
      white-space: nowrap;
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.12s;
      animation: appear 0.35s ease both;
    }

    tbody tr:hover { background: #10100c; }

    tbody td {
      padding: 12px 14px;
      font-size: 0.86rem;
      border-bottom: 1px solid #0f0f0c;
      vertical-align: middle;
      white-space: nowrap;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .col-call    { color: #f5c842; font-size: 1rem; letter-spacing: 0.1em; }
    .col-reg     { color: #fbbf24; font-size: 0.72rem; opacity: 0.6; }
    .col-airline { color: #c4b5fd; }
    .col-route   { color: #6ee7b7; letter-spacing: 0.05em; }
    .col-route-dim { opacity: 0.35; }
    .col-type    { color: #a3a3a0; font-size: 0.8rem; }
    .col-alt     { color: #7dd3fc; }
    .col-spd     { color: #86efac; }
    .col-hdg     { color: #ddd0b0; }
    .col-dst     { color: #666; font-size: 0.8rem; }

    .tag-air      { color: #4ade80; font-size: 0.7rem; letter-spacing: 0.15em; }
    .tag-landing  { color: #fb923c; font-size: 0.7rem; letter-spacing: 0.15em; }

    /* ── EMPTY / ERROR STATES ── */
    .state-row td {
      text-align: center;
      padding: 64px 0;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      color: #2a2a24;
      cursor: default;
    }
    .state-row:hover { background: transparent !important; }
    .err { color: #7f3535 !important; }

    /* ── FOOTER ── */
    footer {
      margin-top: 28px;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      color: #272720;
      text-align: center;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="title">SKYWATCH</div>
    <div class="location" id="loc">OBTENIENDO POSICIÓN...</div>
  </div>
  <div class="meta">
    <div class="live"><span class="dot"></span>EN VIVO</div>
    <div id="ts">--:--:--</div>
    <div id="count">— VUELOS</div>
    <div class="bar-wrap"><div class="bar" id="bar"></div></div>
  </div>
</header>

<table>
  <thead>
    <tr>
      <th>VUELO</th>
      <th>AEROLÍNEA</th>
      <th>RUTA</th>
      <th>AERONAVE</th>
      <th>ALTITUD</th>
      <th>VELOCIDAD</th>
      <th>RUMBO</th>
      <th>DIST.</th>
      <th>ESTADO</th>
    </tr>
  </thead>
  <tbody id="body">
    <tr class="state-row"><td colspan="9">ESPERANDO SEÑAL GPS…</td></tr>
  </tbody>
</table>

<footer>
  ADSB.LOL · ADSBDB.COM &nbsp;·&nbsp; RADIO: 10 KM &nbsp;·&nbsp; REFRESCO: 15 s &nbsp;·&nbsp; CLICK → FLIGHTRADAR24
</footer>

<script>
  const CENTER_LAT  = -34.6037;  // Obelisco, Buenos Aires
  const CENTER_LON  = -58.3816;
  const RADIUS_KM   = 60;
  const RADIUS_NM   = RADIUS_KM / 1.852;
  const INTERVAL_MS = 15_000;
  const LANDED_TTL  = 60_000;

  let countdownId;

  // hex → { seenAirborne: bool, landedAt: number|null }
  const flightState = new Map();
  // callsign → { airline, origin, dest } | null
  const routeCache  = new Map();

  // ── formatting helpers ────────────────────────────────────────────────────

  function fmtAlt(ft) {
    if (ft == null || ft === 'ground') return '—';
    return Number(ft).toLocaleString('es') + ' ft';
  }

  function fmtSpd(kt) {
    return kt != null ? Math.round(kt) + ' kt' : '—';
  }

  function fmtDst(nm) {
    return nm != null ? (nm * 1.852).toFixed(1) + ' km' : '—';
  }

  function hdgStr(deg) {
    if (deg == null) return '—';
    const dirs  = ['N','NE','E','SE','S','SO','O','NO'];
    const arrow = ['↑','↗','→','↘','↓','↙','←','↖'];
    const i = Math.round(deg / 45) % 8;
    return `${Math.round(deg)}° ${arrow[i]}${dirs[i]}`;
  }

  // ── recently-landed state ─────────────────────────────────────────────────

  function tickState(hex, onGround) {
    const s = flightState.get(hex) || { seenAirborne: false, landedAt: null };
    if (!onGround) {
      s.seenAirborne = true;
      s.landedAt     = null;
    } else if (s.seenAirborne && s.landedAt == null) {
      s.landedAt = Date.now();
    }
    flightState.set(hex, s);
  }

  function shouldShow(hex, onGround) {
    if (!onGround) return true;
    const s = flightState.get(hex);
    if (!s || !s.seenAirborne || s.landedAt == null) return false;
    return (Date.now() - s.landedAt) < LANDED_TTL;
  }

  // ── route / airline lookup (adsbdb.com) ───────────────────────────────────

  async function fetchRoute(callsign) {
    if (!callsign || callsign.length < 4) return null;
    if (routeCache.has(callsign)) return routeCache.get(callsign);

    try {
      const res = await fetch(`https://api.adsbdb.com/v0/callsign/${callsign}`);
      if (!res.ok) { routeCache.set(callsign, null); return null; }
      const data = await res.json();
      const fr   = data?.response?.flightroute;
      if (!fr)   { routeCache.set(callsign, null); return null; }

      const route = {
        airline: fr.airline?.name  || null,
        origin:  fr.origin?.iata_code  || fr.origin?.icao_code  || null,
        dest:    fr.destination?.iata_code || fr.destination?.icao_code || null,
      };
      routeCache.set(callsign, route);
      return route;
    } catch {
      routeCache.set(callsign, null);
      return null;
    }
  }

  // ── fetch & render ────────────────────────────────────────────────────────

  async function update() {
    const target = `https://api.adsb.lol/v2/lat/${CENTER_LAT}/lon/${CENTER_LON}/dist/${RADIUS_NM.toFixed(1)}`;
    const url    = `https://corsproxy.io/?${encodeURIComponent(target)}`;

    let data;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      data = await res.json();
    } catch (e) {
      setBodyState(`ERROR AL OBTENER DATOS: ${e.message}`, true);
      startBar();
      return;
    }

    const raw = data.ac || [];

    // update recently-landed state for every aircraft seen
    raw.forEach(a => tickState(a.hex, a.alt_baro === 'ground'));

    // filter: only airborne + recently landed
    const ac = raw.filter(a => shouldShow(a.hex, a.alt_baro === 'ground'));

    // sort: airborne first, then by altitude desc
    ac.sort((a, b) => {
      const aGnd = a.alt_baro === 'ground';
      const bGnd = b.alt_baro === 'ground';
      if (aGnd !== bGnd) return aGnd ? 1 : -1;
      return (Number(b.alt_baro) || 0) - (Number(a.alt_baro) || 0);
    });

    document.getElementById('ts').textContent    = new Date().toLocaleTimeString('es');
    document.getElementById('count').textContent = `${ac.length} VUELO${ac.length !== 1 ? 'S' : ''}`;

    const tbody = document.getElementById('body');
    if (ac.length === 0) {
      setBodyState(`SIN TRÁFICO AÉREO EN ${RADIUS_KM} KM`);
      startBar();
      return;
    }

    // fetch routes in parallel (cached — only new callsigns hit the network)
    const callsigns = ac.map(a => (a.flight || '').trim());
    const routes    = await Promise.all(callsigns.map(cs => fetchRoute(cs)));

    tbody.innerHTML = ac.map((a, i) => {
      const callsign = callsigns[i] || a.hex.toUpperCase();
      const route    = routes[i];
      const onGround = a.alt_baro === 'ground';
      const reg      = a.r ? `<div class="col-reg">${a.r}</div>` : '';

      const airlineHtml = route?.airline
        ? `<span class="col-airline">${route.airline}</span>`
        : '—';

      let routeHtml = '—';
      if (route?.origin || route?.dest) {
        const o = route.origin || '<span class="col-route-dim">???</span>';
        const d = route.dest   || '<span class="col-route-dim">???</span>';
        routeHtml = `${o} <span class="col-route-dim">→</span> ${d}`;
      }

      const statusHtml = onGround
        ? '<span class="tag-landing">ATERRIZANDO</span>'
        : '<span class="tag-air">EN VUELO</span>';

      return `<tr style="animation-delay:${i * 40}ms"
                  data-cs="${callsign}"
                  data-hex="${a.hex}">
        <td class="col-call">${callsign}${reg}</td>
        <td>${airlineHtml}</td>
        <td class="col-route">${routeHtml}</td>
        <td class="col-type">${a.t || '—'}</td>
        <td class="col-alt">${fmtAlt(a.alt_baro)}</td>
        <td class="col-spd">${fmtSpd(a.gs)}</td>
        <td class="col-hdg">${hdgStr(a.track)}</td>
        <td class="col-dst">${fmtDst(a.dst)}</td>
        <td>${statusHtml}</td>
      </tr>`;
    }).join('');

    tbody.querySelectorAll('tr[data-cs]').forEach(row => {
      row.addEventListener('click', () => {
        const cs   = row.dataset.cs.trim();
        const hex  = row.dataset.hex;
        const slug = cs.length > 2 ? encodeURIComponent(cs) : hex;
        window.open(`https://www.flightradar24.com/${slug}`, '_blank', 'noopener');
      });
    });

    startBar();
  }

  // ── progress bar ──────────────────────────────────────────────────────────

  function startBar() {
    clearInterval(countdownId);
    const bar   = document.getElementById('bar');
    const total = INTERVAL_MS / 1000;
    let elapsed = 0;
    bar.style.width = '100%';
    countdownId = setInterval(() => {
      elapsed++;
      bar.style.width = Math.max(0, 100 - (elapsed / total) * 100) + '%';
    }, 1000);
  }

  // ── utils ─────────────────────────────────────────────────────────────────

  function setBodyState(msg, isErr = false) {
    document.getElementById('body').innerHTML =
      `<tr class="state-row"><td colspan="9" class="${isErr ? 'err' : ''}">${msg}</td></tr>`;
  }

  // ── init ──────────────────────────────────────────────────────────────────

  function init() {
    document.getElementById('loc').textContent = `BUENOS AIRES · CABA + GBA · RADIO ${RADIUS_KM} KM`;
    update();
    setInterval(update, INTERVAL_MS);
  }

  init();
</script>
</body>
</html>
